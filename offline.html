<!DOCTYPE html>
<html lang="en">

    button { background: linear-gradient(135deg, #C9A052, #E8C47A); color: #0D1B3E; border: none; border-radius: 10px; padding: 12px 28px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

</head>
